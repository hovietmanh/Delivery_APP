version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: delivery_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: delivery_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - delivery_network

  redis:
    image: redis:7-alpine
    container_name: delivery_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - delivery_network

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: delivery_api
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    ports:
      - '3000:3000'
    depends_on:
      - postgres
      - redis
    networks:
      - delivery_network

  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
    container_name: delivery_admin
    restart: unless-stopped
    ports:
      - '5173:80'
    networks:
      - delivery_network

volumes:
  postgres_data:
  redis_data:

networks:
  delivery_network:
    driver: bridge
